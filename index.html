<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#8fd36b" />
<meta name="description" content="Central simples do Avelitrix para acessar os módulos." />
<link rel="manifest" href="./manifest.webmanifest" />
<link rel="icon" href="./assets/icons/icon-192.png" sizes="192x192" />
<link rel="apple-touch-icon" href="./assets/icons/icon-192.png" />
<title>Avelitrix</title>
<style>
:root{--bg:#f4f6f1;--card:#fff;--ink:#1f2a1f;--muted:#617061;--brand:#8fd36b;--brand-strong:#67b63e;--line:#d9e4d2;--shadow:0 14px 34px rgba(31,42,31,.08);--radius:24px}
*{box-sizing:border-box}html,body{height:100%}body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--ink);background:radial-gradient(circle at top,rgba(143,211,107,.16),transparent 28%),linear-gradient(180deg,#f7faf5 0%,var(--bg) 100%)}
.app-shell{min-height:100%;display:flex;align-items:center;justify-content:center;padding:24px 16px 40px}
.launcher{width:min(100%,620px);background:rgba(255,255,255,.78);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.7);box-shadow:var(--shadow);border-radius:28px;padding:24px 18px 18px}
.hero{text-align:center;margin-bottom:22px}.brand-mark{width:76px;height:76px;margin:0 auto 14px;display:grid;place-items:center;border-radius:22px;background:linear-gradient(180deg,#9add74 0%,#7bc955 100%);box-shadow:0 10px 22px rgba(103,182,62,.28)}
.hero h1{margin:0;font-size:1.95rem;line-height:1.05;letter-spacing:-.03em}.hero p{margin:8px 0 0;color:var(--muted);font-size:.98rem}
.module-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
.module-card{appearance:none;text-decoration:none;color:inherit;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);min-height:156px;padding:16px 14px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;text-align:center;transition:transform .18s ease,box-shadow .18s ease,border-color .18s ease,background .18s ease;box-shadow:0 8px 20px rgba(31,42,31,.04);-webkit-tap-highlight-color:transparent;position:relative;overflow:hidden}
.module-card::after{content:"";position:absolute;inset:auto -30% -55% auto;width:110px;height:110px;border-radius:50%;background:rgba(143,211,107,.12);pointer-events:none}
.module-card:hover,.module-card:focus-visible,.module-card.is-active{transform:translateY(-2px) scale(1.01);box-shadow:0 16px 28px rgba(31,42,31,.10);border-color:#b7d8a4;background:linear-gradient(180deg,#fff 0%,#f8fcf5 100%);outline:none}
.icon-wrap{width:68px;height:68px;display:grid;place-items:center;border-radius:20px;background:#f4faef;border:1px solid #d8ead0;z-index:1}.module-card h2{margin:0;font-size:1.08rem;line-height:1.15;z-index:1}.module-card small{color:var(--muted);font-size:.82rem;line-height:1.2;z-index:1}
.footer-actions{margin-top:18px;display:flex;flex-direction:column;gap:10px;align-items:center}.install-btn{appearance:none;border:0;background:linear-gradient(180deg,var(--brand) 0%,var(--brand-strong) 100%);color:#173010;border-radius:999px;padding:12px 16px;font-weight:700;font-size:.96rem;box-shadow:0 8px 18px rgba(103,182,62,.22);cursor:pointer;display:none}.install-btn.show{display:inline-flex;align-items:center;gap:8px}.tip{margin:0;text-align:center;font-size:.83rem;color:var(--muted)}svg{display:block}
@media(max-width:420px){.launcher{padding:22px 14px 16px;border-radius:24px}.module-grid{gap:12px}.module-card{min-height:144px;padding:14px 12px}.hero h1{font-size:1.72rem}.hero p{font-size:.92rem}.icon-wrap{width:62px;height:62px}}
</style>
</head>
<body>
<main class="app-shell"><section class="launcher" aria-labelledby="launcherTitleAvelitrix">
<header class="hero"><div class="brand-mark" aria-hidden="true"><svg width="44" height="44" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="4" y="6" width="12" height="12" rx="3" fill="white" opacity=".95"/><rect x="28" y="6" width="12" height="12" rx="3" fill="white" opacity=".95"/><rect x="10" y="18" width="10" height="20" rx="3" fill="white" opacity=".95"/><rect x="24" y="18" width="10" height="20" rx="3" fill="white" opacity=".95"/><rect x="4" y="30" width="12" height="8" rx="3" fill="white" opacity=".95"/><rect x="28" y="30" width="12" height="8" rx="3" fill="white" opacity=".95"/></svg></div><h1 id="launcherTitleAvelitrix">Avelitrix</h1><p>Escolha um módulo para abrir.</p></header>
<div class="module-grid">

<a class="module-card" href="https://avelitrix.github.io/Coach/"><span class="icon-wrap" aria-hidden="true"><svg width="40" height="40" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="32" cy="32" r="20" fill="#D9F4C8" stroke="#67B63E" stroke-width="4"/><path d="M20 29C24 26 27 26 32 29C37 32 40 32 44 29" stroke="#67B63E" stroke-width="4" stroke-linecap="round"/><path d="M20 39C24 36 27 36 32 39C37 42 40 42 44 39" stroke="#67B63E" stroke-width="4" stroke-linecap="round"/><path d="M32 12C32 18 26 22 20 22" stroke="#67B63E" stroke-width="3.5" stroke-linecap="round"/><path d="M32 52C32 46 38 42 44 42" stroke="#67B63E" stroke-width="3.5" stroke-linecap="round"/></svg></span><h2>AveliCoach</h2><small>Treinador e análise</small></a>

<a class="module-card" href="https://avelitrix.github.io/breathlitrix/"><span class="icon-wrap" aria-hidden="true"><svg width="40" height="40" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M32 12C37 18 43 23 43 33C43 42 38 49 32 49C26 49 21 42 21 33C21 23 27 18 32 12Z" fill="#FFD86B" stroke="#67B63E" stroke-width="4"/><path d="M32 23C35 27 38 30 38 35C38 40 35 44 32 44C29 44 26 40 26 35C26 30 29 27 32 23Z" fill="#8ED3FF" stroke="#67B63E" stroke-width="3"/><path d="M14 52H50" stroke="#1F2A1F" stroke-width="4" stroke-linecap="round" opacity=".7"/></svg></span><h2>Breathlitrix</h2><small>Respiração guiada</small></a>

<a class="module-card" href="https://avelitrix.github.io/Diario/"><span class="icon-wrap" aria-hidden="true"><svg width="40" height="40" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="16" y="12" width="32" height="40" rx="5" fill="#F4FAEF" stroke="#67B63E" stroke-width="4"/><path d="M24 10V20M40 10V20M24 28H40M24 36H40M24 44H34" stroke="#67B63E" stroke-width="4" stroke-linecap="round"/></svg></span><h2>Diário</h2><small>Registro do dia</small></a>

<a class="module-card" href="https://avelitrix.github.io/Estiling/"><span class="icon-wrap" aria-hidden="true"><svg width="40" height="40" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="49" cy="15" r="8" stroke="#67B63E" stroke-width="4"/><path d="M17 52L25 24M47 52L39 24" stroke="#67B63E" stroke-width="5" stroke-linecap="round"/><path d="M25 24C27.5 18.5 36.5 18.5 39 24" stroke="#67B63E" stroke-width="5" stroke-linecap="round"/><path d="M33 24L44 18" stroke="#67B63E" stroke-width="4" stroke-linecap="round"/><path d="M21 52H43" stroke="#1F2A1F" stroke-width="4" stroke-linecap="round" opacity=".75"/></svg></span><h2>Estiling</h2><small>Controle emocional</small></a>

<a class="module-card" href="https://avelitrix.github.io/Estrategista/"><span class="icon-wrap" aria-hidden="true"><svg width="40" height="40" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="13" y="13" width="38" height="38" rx="7" fill="#F4FAEF" stroke="#67B63E" stroke-width="4"/><path d="M22 22H42M22 32H42M22 42H42M22 22V42M32 22V42M42 22V42" stroke="#67B63E" stroke-width="3.5" stroke-linecap="round"/><circle cx="22" cy="42" r="4.2" fill="#FFD86B" stroke="#1F2A1F" stroke-width="2"/><circle cx="42" cy="22" r="4.2" fill="#8ED3FF" stroke="#1F2A1F" stroke-width="2"/><path d="M25 39L39 25M36 25H39V28" stroke="#1F2A1F" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></span><h2>Estrategista</h2><small>Plano tático</small></a>

</div><div class="footer-actions"><button class="install-btn" id="installBtnAvelitrix" type="button"><span aria-hidden="true">⬇️</span><span>Instalar Avelitrix</span></button><p class="tip">Se o botão não aparecer, use o menu do Chrome para instalar ou criar o atalho.</p></div>
</section></main>
<script>
(function(){const b=document.getElementById('installBtnAvelitrix');const c=[...document.querySelectorAll('.module-card')];let p=null;c.forEach(x=>{x.addEventListener('pointerdown',()=>x.classList.add('is-active'));x.addEventListener('pointerup',()=>x.classList.remove('is-active'));x.addEventListener('pointerleave',()=>x.classList.remove('is-active'));x.addEventListener('blur',()=>x.classList.remove('is-active'))});window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();p=e;b.classList.add('show')});b.addEventListener('click',async()=>{if(!p)return;p.prompt();await p.userChoice;p=null;b.classList.remove('show')});window.addEventListener('appinstalled',()=>{p=null;b.classList.remove('show')});if('serviceWorker'in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('./service-worker.js').catch(()=>{}))})();
</script>
</body></html>
